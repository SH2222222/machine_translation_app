<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English to French Translator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            padding: 10px 18px;
            font-size: 16px;
            cursor: pointer;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>English to French Translator</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter an English sentence here...">{{ user_input }}</textarea>
        <br>
        <button type="submit">Translate</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>French Translation:</h3>
        <p>{{ result }}</p>
    </div>
    {% endif %}
</body>
</html>
